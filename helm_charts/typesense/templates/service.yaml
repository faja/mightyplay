---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "typesense.fullname" . }}-hl # headless
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "typesense.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  clusterIP: None # headless
  publishNotReadyAddresses: true # <-- important for service discovery
  ports:
    - name: http
      port: 8108
      targetPort: http
    - name: peering
      port: 8107
      targetPort: peering
  selector:
    {{- include "typesense.selectorLabels" . | nindent 4 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "typesense.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "typesense.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8108
      targetPort: http
  selector:
    {{- include "typesense.selectorLabels" . | nindent 4 }}
